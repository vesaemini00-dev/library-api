version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./library.db
      - API_KEY=mysecretapikey123
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             python3 scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"